# Unity Build Configuration for CornCraft Android
# This configuration is designed to build the CornCraft Minecraft client for Android

name: Build CornCraft Unity Project for Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}  # Unity Pro license file
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}      # Unity account email
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }} # Unity account password

jobs:
  build:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Setup Unity
        uses: game-ci/unity-setup@v4
        with:
          unityVersion: 6000.3.9f1
          targetPlatform: Android
          modules: '[]'

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Create Unity activation file
        run: |
          xargs printf '%s\\n' "${UNITY_LICENSE}" > ./Unity_v20XX.X.X.ulf
        shell: bash

      - name: Activate Unity
        uses: game-ci/unity-activate@v4
        with:
          username: ${{ env.UNITY_EMAIL }}
          password: ${{ env.UNITY_PASSWORD }}
          serial: ./Unity_v20XX.X.X.ulf

      - name: Build Unity Project for Android
        uses: game-ci/unity-build@v4
        with:
          targetPlatform: Android
          allowDirtyBuild: true
          versioning: None
          customParameters: "-quit -batchmode -nographics"

      - name: Deactivate Unity
        if: always()
        uses: game-ci/unity-deactivate@v4

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: corn-craft-android-apk
          path: build/Android/*.apk

      - name: Archive Build Logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-logs
          path: build/logs/

