name: CornCraft Android 自动构建
# 触发规则：和你之前的配置一致，推送到 main 分支自动执行；同时支持手动触发构建
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许在 GitHub 网页手动点击触发构建

# 构建任务
jobs:
  build-android:
    name: 构建 Android 安装包
    runs-on: ubuntu-latest
    # 对应你之前用的 Unity 镜像，这里用官方 game-ci 镜像，适配 GitHub Actions，自带 Android SDK/NDK
    container:
      image: unityci/editor:ubuntu-6000.3.1f1-android-3.0.1
      # 注意：上面的版本号 6000.3.1f1 必须和你项目 ProjectSettings 里的 Unity 版本完全一致！
      # 如果你用的是 6000.3.9f1，就改成 unityci/editor:ubuntu-6000.3.9f1-android-3.0.1

    steps:
      # 步骤1：拉取你仓库的完整代码
      - name: 检出项目代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：缓存 Unity 依赖库，大幅提升二次构建速度（从几十分钟缩短到几分钟）
      - name: 缓存 Unity Library 目录
        uses: actions/cache@v4
        with:
          path: Library
          key: Unity-Library-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: Unity-Library-

      # 步骤3：激活 Unity 编辑器（核心！必须配置 Secrets 才能正常激活）
      - name: 激活 Unity 许可证
        run: |
          unity-editor -batchmode -nographics \
          -username "$UNITY_EMAIL" \
          -password "$UNITY_PASSWORD" \
          -serial "$UNITY_SERIAL" \
          -quit
        env:
          # 这三个参数需要你在 GitHub 仓库配置 Secrets，下面会教你怎么弄
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      # 步骤4：执行 Android 构建，完全对齐你之前 GitLab 的构建命令
      - name: 构建 Android 安装包
        run: |
          unity-editor -batchmode -nographics \
          -projectPath . \
          -buildTarget Android \
          -customBuildName CornCraft \
          -customBuildPath ./build/ \
          -quit

      # 步骤5：上传构建产物（和 GitLab 的 artifacts 一致，构建完成后可以直接下载 apk）
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: CornCraft-Android-Build
          path: ./build/ # 对应你之前的构建输出路径
          retention-days: 30 # 产物保留30天

      # 步骤6：归还 Unity 许可证（必须！不然会占用你的激活名额，导致后续激活失败）
      - name: 归还 Unity 许可证
        if: always() # 无论构建成功/失败，都执行归还操作
        run: |
          unity-editor -batchmode -nographics \
          -returnlicense \
          -quit
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
concurrency: 
